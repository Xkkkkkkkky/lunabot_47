# 通用模块配置。除明确标注外，时间单位均为秒，路径均相对于项目根目录。
log_level: "INFO"  # LunaBot 自身日志级别，例如 DEBUG、INFO、WARNING

# 输出 Painter 进程内存占用的诊断信息；正常运行保持关闭。
debug:
  painter: false

# 超级用户 QQ 号只填写在 config；example 永远不要放真实号码。
superuser: []  # 复制后仅在真实 config 中填写

# “/确认”“/取消”等二次确认操作的等待时间，超时后自动取消。
confirm_actions_timeout_seconds: 300

# 在 min～max 之间随机延迟启动后台任务，避免启动瞬间集中请求外部服务。
startup_task_delay_seconds:
  min: 0
  max: 3

# 启动阶段的 yappi CPU/墙钟性能采样；键名 starup 为兼容源码保留，不能改名。
profile_at_starup:
  enable: false
  clock_type: "cpu"  # yappi 时钟类型：cpu 或 wall
  seconds: 10        # 自动停止并写入性能报告前的采样时长

# 启动阶段的 memray 内存采样；开启前需安装 memray。
memray_at_startup:
  enable: false
  seconds: 300  # 自动停止采样前的持续时间

file_db:
  # FileDB 脏数据的批量落盘间隔；设为 0 时每次修改都立即写盘。
  save_interval_seconds: 5

timer:
  enable: false  # 是否输出 ProfileTimer 的耗时日志
  log_prefix:    # 仅记录名称以这些字符串开头的计时器；空列表表示全部
    - handler
    - sekaihandler

# OneBot 查询结果的内存缓存有效期；调小会提高实时性，也会增加接口调用。
group_member_name_cache_expire_seconds: 300  # 群成员名称
stranger_name_cache_expire_seconds: 300      # 陌生人名称
group_name_cache_expire_seconds: 3600        # 群名称
bot_group_cache_expire_seconds: 60           # Bot 所在群列表
bot_friend_cache_expire_seconds: 60          # Bot 好友列表

draw:
  # 背景路径统一由 .env 的 DRAW_BACKGROUND_IMAGE 配置。
  # 此键仅兼容旧部署；新部署保持为空，不要在 example 中写机器相关路径。
  background_image: ""
  theme:
    # 配色预设（填写下列英文键名；未知值会回退到 niigo）：
    # Project SEKAI：niigo、leoneed、mmj、vbs、wxs、virtual_singer
    # BanG Dream!：poppin_party、afterglow、pastel_palettes、roselia、
    # hello_happy_world、morfonica、raise_a_suilen、mygo、ave_mujica、
    # mugendai_mewtype
    palette: "niigo"
    color_count: 24                  # 连续数据色板的颜色数量
    categorical_color_count: 10      # 离散分类色板的颜色数量
    saturation: 0.72                 # 连续色板饱和度，范围 0～1
    categorical_saturation: 0.92     # 分类色板饱和度，范围 0～1
    lightness: 0.56                  # 生成色的基准明度，范围 0～1
    hue_span: 0.30                   # 连续色板围绕主色展开的色相跨度
    categorical_hue_span: 0.42       # 分类色板围绕主色展开的色相跨度
  # 按字符串群号覆盖上述 theme 字段；真实群号只能写在 config。
  # group_themes:
  #   "<group_id>":
  #     palette: "roselia"
  group_themes: {}

msg_send:
  rate_limit:
    second: 10  # 当前进程每秒最多发送的消息数，超出后丢弃本次发送
    day: 4000   # 每个 Bot 账号每天最多发送的消息数
  # 发送失败邮件的预留节流参数；当前发送异常通知代码未启用。
  failed_mail_interval: 600
  
  default_fold_threshold: 20  # 估算行数达到该值后优先发送合并转发
  # 合并转发失败时的回退方式：seperate、join_newline、join 或 none。
  default_fold_fallback_method: "none"
  max_fold_msg_segment_count: 5  # 超长折叠消息最多拆成多少段
  max_fold_msg_len: 6000         # 每段折叠消息的最大文本长度

  tmp_img_keep_minutes: 5  # 发送图片用临时文件的保留时间（分钟）

  image_transport:
    # file 直接发送本机路径；Bot 与 NapCat 跨机器时使用 napcat_stream。
    mode: "file"
    napcat_stream:
      chunk_size: 65536         # 单次上传分块的字节数，必须大于 0
      file_retention_ms: 300000 # NapCat 合并文件的保留时间（毫秒）
      verify_sha256: true       # 上传时附带整文件 SHA-256 供远端校验

  low_quality_image:
    default_quality: 75     # Pillow JPEG quality，范围通常为 1～95
    default_subsampling: 2  # JPEG 色度抽样：0=4:4:4、1=4:2:2、2=4:2:0
    default_optimize: true  # 是否让 Pillow 优化 JPEG Huffman 表

font:
  path: "data/utils/fonts/SourceHanSansCN-Regular.otf"  # STA 等模块直接读取的中文字体文件
  name: "Source Han Sans SC"  # 为仍按字体族名选字的绘图库保留

default_cd: 2            # 未单独配置时的用户指令冷却时间
cd_verbose_interval: 30  # 冷却期间重复提示“当前正在冷却”的最小间隔

exception_mail:   # 可选的异常邮件配置；真实凭据禁止写入 example
  host: "smtp.qq.com"  # SMTP 服务器地址
  port: 587            # SMTP 服务器端口
  user: ""            # SMTP 认证用户名，只能在真实 config 中填写
  pass: ""            # SMTP 密码或授权码，只能在真实 config 中填写
  from: ""            # 发件地址；留空时使用 user
  use_tls: true        # 是否在连接后执行 STARTTLS
  receivers: []        # 收件地址列表；空列表时不会发信

default_thread_pool_size: 4  # 通用线程池工作线程数；过大会增加内存与上下文切换

safety_check:
  enabled: false  # 是否在发送前调用腾讯云文本安全检查
  secret_id: ""  # 只在真实 config 中填写
  secret_key: "" # 只在真实 config 中填写
  endpoint: ims.tencentcloudapi.com  # 腾讯云 IMS 服务端点


plot:
  debug: false                    # 是否保存/输出绘图调试信息
  log_draw_time: false            # 是否打印布局和渲染耗时
  canvas_size_limit: [4096, 4096] # 画布像素面积上限按两数乘积计算

painter:
  debug: false           # 是否输出 Painter 内部调试日志
  process_num: 4         # 绘图进程数；设为 0 时在主进程使用线程
  log_operation: false   # 是否记录每个绘图操作，调试之外不建议开启
  font_cache_num: 16     # 单进程最多缓存的字体对象数量
  roundrect_aa_target_radius: 32  # 圆角抗锯齿的目标半径
  emoji:
    offset: [0, 2]  # Emoji 相对文字基线的 [x, y] 像素偏移
    scale: 1.0      # Emoji 相对字号的缩放倍率


playwright:
  # 如使用 Docker，请共享 data/utils/tmp/ 文件夹到与 Playwright 容器内目录一致
  context_num: 8      # 同时打开的浏览器 Context 上限
  remote_url: ""     # 远程 WS/CDP 地址；留空时启动本地无头浏览器
  browser_type: "chromium"  # chromium、firefox 或 webkit


# 高危开关：是否允许超级用户通过 /exec 执行 Python 代码。
allow_code_exec: false
