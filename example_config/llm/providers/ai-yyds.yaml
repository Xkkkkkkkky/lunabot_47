# AI-YYDS 的 OpenAI 兼容供应方配置，模型前缀为 ay:。
qps_limit: 5  # 当前进程对该供应方的每秒请求上限
quota_sync_interval_sec: 60*60*6  # 自动查询余额的间隔；支持简单四则运算
price_unit: "$"  # 价格和余额日志使用的显示单位

# API 凭据、站点地址和登录凭据均属于隐私信息，只能填写在真实 config。
api_key: ""
base_url: ""

# 下列网页登录信息用于 Playwright 获取余额查询 cookie，不参与模型请求认证。
login_url: ""
username: ""
password: ""

quota_url: ""  # 返回当前账号余额的接口

# 模型公共字段：name 为 bot 内名称，model_id 省略时使用 name；
# input/output_pricing 均为每 token 价格，is_multimodal 控制是否允许图片输入。
models:
  - name: "gpt-5"
    input_pricing: 0.000001875
    output_pricing: 0.000015
    is_multimodal: false

  - name: "gpt-5-mini"
    input_pricing: 0.000000375
    output_pricing: 0.000003
    is_multimodal: false

  - name: "gpt-5-nano"
    input_pricing: 0.000000075
    output_pricing: 0.0000006
    is_multimodal: false

  - name: "gpt-4.1"
    input_pricing: 0.000003
    output_pricing: 0.000012
    is_multimodal: true

  - name: "gpt-4.1-mini"
    input_pricing: 0.0000006
    output_pricing: 0.0000024
    is_multimodal: true

  - name: "gpt-4.1-nano"
    input_pricing: 0.00000015
    output_pricing: 0.0000006
    is_multimodal: true

  - name: "o4-mini"
    input_pricing: 0.00000165
    output_pricing: 0.0000066
    is_multimodal: true

  - name: "o4-mini-high"
    input_pricing: 0.00000165
    output_pricing: 0.0000066
    is_multimodal: true

  - name: "o3-mini"
    input_pricing: 0.00000165
    output_pricing: 0.0000066
    # data 目前只是模型元数据，不会转发给 API；请求参数应放 client_kwargs/extra_body。
    data:
      reasoning_effort: "high"

  - name: "gpt-4o-mini"
    input_pricing: 0.000000225
    output_pricing: 0.0000009
    is_multimodal: true

  - name: "gpt-4o"
    input_pricing: 0.00000375
    output_pricing: 0.000015
    is_multimodal: true

  - name: "claude-sonnet-4"
    model_id: "claude-sonnet-4-20250514"
    input_pricing: 0.0000045
    output_pricing: 0.0000225
    is_multimodal: true

  - name: "claude-opus-4"
    model_id: "claude-opus-4-20250514"
    input_pricing: 0.0000225
    output_pricing: 0.0001125
    is_multimodal: true

  - name: "gemini-2.5-pro"
    model_id: "gemini-2.5-pro-preview"
    input_pricing: 0.00375/1000
    output_pricing: 0.0225/1000
    is_multimodal: true

  - name: "gemini-2.5-flash"
    model_id: "gemini-2.5-flash-preview-05-20"
    input_pricing: 0.000225/1000
    output_pricing: 0.0009/1000
    is_multimodal: true

  - name: "gemini-2.5-flash-thinkinbg"
    model_id: "gemini-2.5-flash-preview-05-20:thinking"
    input_pricing: 0.000225/1000
    output_pricing: 0.0009/1000
    is_multimodal: true

  - name: "gpt-oss-120b"
    model_id: "gpt-oss-120b"
    input_pricing: 0.000225/1000
    output_pricing: 0.001125/1000

  - name: "gpt-oss-20b"
