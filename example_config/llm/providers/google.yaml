# Google 原生 generateContent 供应方配置，模型前缀为 gg:。
qps_limit: 5  # 当前进程对该供应方的每秒请求上限
# 该供应方当前不支持自动查余额；间隔仍用于统一的本地额度检查流程。
quota_sync_interval_sec: 60*60*6
price_unit: "$"  # 价格和本地余额日志使用的显示单位

# 可选 HTTP 参数：base_url、api_version、proxy、timeout；私有地址只写在 config。
http_options:
  base_url: ""  # 留空时使用代码内置的 Google 官方地址

# API key 属于隐私信息，只能填写在真实 config。
api_key: ""

# name 是 bot 内名称，model_id 是发送给 Google 的模型 ID；is_multimodal
# 控制是否允许图片输入。client_kwargs 会原样传入当前 Google 客户端。
models:

  # ============= 2.5 models ============= #

  - name: "gemini-2.5-pro"
    model_id: "models/gemini-2.5-pro"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_budget: 128

  - name: "gemini-2.5-pro-high"
    model_id: "models/gemini-2.5-pro"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_budget: -1

  - name: "gemini-2.5-flash"
    model_id: "models/gemini-2.5-flash"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: false  # 普通 Flash 预设不返回思考内容

  - name: "gemini-2.5-flash-thinking"
    model_id: "models/gemini-2.5-flash"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_budget: 512

  - name: "gemini-2.5-flash-thinking-high"
    model_id: "models/gemini-2.5-flash"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_budget: -1

  # ============= 3 models ============= #

  - name: "gemini-3-pro"
    model_id: "models/gemini-3-pro-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_level: low

  - name: "gemini-3-pro-high"
    model_id: "models/gemini-3-pro-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_level: high

  - name: "gemini-3-flash"
    model_id: "models/gemini-3-flash-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: false

  - name: "gemini-3-flash-thinking"
    model_id: "models/gemini-3-flash-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_level: low

  - name: "gemini-3-flash-thinking-medium"
    model_id: "models/gemini-3-flash-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_budget: medium

  - name: "gemini-3-flash-thinking-high"
    model_id: "models/gemini-3-flash-preview"
    is_multimodal: true
    client_kwargs:
      thinking_config:
        include_thoughts: true
        thinking_level: high

  # ============= flash lite models ============= #

  - name: "gemini-2.5-flash-lite"
    model_id: "models/gemini-2.5-flash-lite"
    is_multimodal: true

  # ============= imagen models ============= #
  # image_response=true 表示该模型可请求图片输出，而不只是理解输入图片。

  - name: "gemini-2-flash-image"
    model_id: "models/gemini-2.0-flash-preview-image-generation"
    is_multimodal: true
    image_response: true

  - name: "gemini-2.5-flash-image"
    model_id: "models/gemini-2.5-flash-image-preview"
    is_multimodal: true
    image_response: true

  - name: "gemini-3-pro-image"
    model_id: "models/gemini-3-pro-image-preview"
    is_multimodal: true
