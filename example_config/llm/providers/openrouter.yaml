# OpenRouter/OpenAI 兼容供应方配置，模型前缀为 or:。
qps_limit: 5  # 当前进程对该供应方的每秒请求上限
quota_sync_interval_sec: 60*60*6  # 调用 auth_key_url 刷新余额的间隔
price_unit: "$"  # 价格和余额日志使用的显示单位

# API key、兼容端点和余额端点均属于部署信息，只能填写在真实 config。
api_key: ""
base_url: ""
auth_key_url: ""

# name 是 bot 内名称，model_id 是 OpenRouter 实际模型 ID；定价为每 token。
# is_multimodal 控制图片输入。allow_online 当前只是元数据，不会自动开启联网。
models:
  - name: "deepseek-r1-free"
    model_id: "deepseek/deepseek-r1-0528:free"
    allow_online: true

  - name: "deepseek-r1"
    model_id: "deepseek/deepseek-r1-0528"
    input_pricing: 0.75/1e6
    output_pricing: 2.4/1e6
    allow_online: true

  - name: "deepseek-v3"
    model_id: "deepseek/deepseek-chat-v3-0324"
    input_pricing: 0.49/1e6
    output_pricing: 0.89/1e6
    allow_online: true

  - name: "deepseek-v3-free"
    model_id: "deepseek/deepseek-chat-v3-0324:free"
    allow_online: true

  - name: "qwen3-free"
    model_id: "qwen/qwen3-235b-a22b:free"
    allow_online: true

  - name: "qwen3"
    model_id: "qwen/qwen3-235b-a22b"
    input_pricing: 0.2/1e6
    output_pricing: 0.6/1e6
    allow_online: true

  - name: "gemini-2.5-flash"
    model_id: "google/gemini-2.5-flash"
    input_pricing: 0.3/1e6
    output_pricing: 2.5/1e6
    is_multimodal: true

  - name: "gemini-2.5-flash-lite"
    model_id: "google/gemini-2.5-flash-lite"
    input_pricing: 0.1/1e6
    output_pricing: 0.4/1e6
    is_multimodal: true
