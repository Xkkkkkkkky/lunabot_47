# SiliconFlow/OpenAI 兼容供应方配置，模型前缀为 sf:。
qps_limit: 5  # 当前进程对该供应方的每秒请求上限
quota_sync_interval_sec: 60*60*6  # 调用 user_info_url 刷新余额的间隔
price_unit: "￥"  # 价格和余额日志使用的显示单位

# API key、兼容端点和用户信息端点均属于部署信息，只能填写在真实 config。
api_key: ""
base_url: ""
user_info_url: ""

# name 是 bot 内名称，model_id 是上游实际模型 ID；定价支持“金额/Token数”；
# is_multimodal 控制是否允许把图片随请求发送。
models:
  - name: "deepseek-r1"
    model_id: "deepseek-ai/DeepSeek-R1"
    input_pricing: 4/1e6
    output_pricing: 16/1e6

  - name: "deepseek-v3"
    model_id: "deepseek-ai/DeepSeek-V3"
    input_pricing: 2/1e6
    output_pricing: 8/1e6

  - name: "deepseek-r1-pro"
    model_id: "Pro/deepseek-ai/DeepSeek-R1"
    input_pricing: 4/1e6
    output_pricing: 16/1e6

  - name: "deepseek-vl2"
    model_id: "deepseek-ai/deepseek-vl2"
    input_pricing: 0.99/1e6
    output_pricing: 0.99/1e6
    is_multimodal: true
