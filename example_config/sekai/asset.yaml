# PJsk 总开关关闭时本文件不会加载；保留完整键供以后显式启用时使用。
debug: false
default_masterdata_update_check_timeout: 3    # 默认MasterData数据源检查更新超时时间（秒）
default_masterdata_download_timeout: 10       # 默认MasterData下载超时时间（秒）
default_rip_asset_download_timeout: 5         # 默认解包资源下载超时时间（秒）
rip_img_cache_max_res: 256*256                # 解包资源图片缓存最大分辨率
debug_log_img_cache: false                    # 是否启用解包资源图片缓存调试日志

# 日服
jp:
  masterdata:
    sources:
      # Haruki 仓库仅提供日服实时 MasterData；最终路径例如 {base_url}cards.json。
      - name: "haruki"
        base_url: "https://raw.githubusercontent.com/Team-Haruki/haruki-sekai-master/refs/heads/main/master/"
        version_url: "https://raw.githubusercontent.com/Team-Haruki/haruki-sekai-master/refs/heads/main/versions/current_version.json"

  rip:  # 解包资源数据源
    sources:
      # name 必须保持为 sekai.best，以启用源码内置的路径映射（去除 _rip，谱面补 .txt）。
      - name: "sekai.best"
        base_url: "https://storage.sekai.best/sekai-jp-assets/"
